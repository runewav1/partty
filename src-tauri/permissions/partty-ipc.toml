[[permission]]
identifier = "partty-ipc"
description = "Partty PTY, window, palette, persistence IPC."
commands.allow = [
  "pty_ensure",
  "pty_spawn",
  "pty_write",
  "pty_replay_snapshot",
  "pty_resize",
  "pty_kill",
  "pty_kill_pane",
  "pty_focus_pane",
  "pty_ack_exit",
  "pty_shell_cwd",
  "pty_shell_exe_token",
  "get_persisted_state",
  "list_extensions",
  "set_extension_enabled",
  "get_app_session_id",
  "list_custom_theme_names",
  "read_custom_theme_json",
  "write_custom_theme_json",
  "delete_custom_theme_json",
  "list_preset_names",
  "read_preset_json",
  "write_preset_json",
  "delete_preset_json",
  "set_prefs",
  "toggle_overlay",
  "webview_boot_complete",
  "commit_show_window",
  "request_destroy_webview_for_hide",
  "detect_shells",
  "open_external_url",
]
