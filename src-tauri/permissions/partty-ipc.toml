[[permission]]
identifier = "partty-ipc"
description = "Partty PTY, window, palette, persistence IPC."
commands.allow = [
  "pty_ensure",
  "pty_spawn",
  "pty_write",
  "pty_replay_snapshot",
  "pty_resize_batch",
  "pty_kill",
  "pty_kill_pane",
  "pty_focus_pane",
  "pty_ack_exit",
  "pty_shell_cwd",
  "pty_shell_exe_token",
  "get_persisted_state",
  "list_extensions",
  "set_extension_enabled",
  "get_app_session_id",
  "stash_terminal_buffers",
  "take_terminal_buffers",
  "take_webview_destroyed_for_hide",
  "set_pty_output_unlocked",
  "list_themes",
  "read_theme",
  "write_theme",
  "delete_theme",
  "get_theme_effective_prefs",
  "set_prefs",
  "toggle_overlay",
  "webview_boot_complete",
  "commit_show_window",
  "request_destroy_webview_for_hide",
  "get_keybinds",
  "set_keybind",
  "reset_keybinds",
  "detect_shells",
  "list_profiles",
  "get_profile",
  "list_workspaces",
  "read_workspace",
  "write_workspace",
  "delete_workspace",
  "open_external_url",
]
